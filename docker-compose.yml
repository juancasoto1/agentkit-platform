version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agentkit_db
    environment:
      POSTGRES_USER: agentkit
      POSTGRES_PASSWORD: agentkit_password
      POSTGRES_DB: agentkit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentkit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (opcional, para caching y task queue)
  redis:
    image: redis:7-alpine
    container_name: agentkit_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build: ./backend
    container_name: agentkit_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentkit:agentkit_password@postgres:5432/agentkit_db
      DATABASE_URL_SYNC: postgresql://agentkit:agentkit_password@postgres:5432/agentkit_db
      REDIS_URL: redis://redis:6379
      PORT: 8000
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
